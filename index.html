<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5efe4" />
    <meta name="description" content="Chatbot PWA offline con WebLLM y contexto local del negocio." />
    <link rel="manifest" href="./manifest.json" />
    <title>Chat Local del Negocio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --panel: rgba(255, 252, 246, 0.92);
        --ink: #20201d;
        --muted: #666154;
        --brand: #9b5b2a;
        --brand-strong: #7b431c;
        --line: rgba(32, 32, 29, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, rgba(255, 214, 170, 0.8), transparent 30%),
          linear-gradient(160deg, #efe4d2 0%, var(--bg) 48%, #ebe7df 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 760px);
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 18px 50px rgba(50, 34, 22, 0.12);
        overflow: hidden;
      }

      header {
        padding: 24px 24px 16px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .status {
        padding: 12px 24px;
        background: rgba(155, 91, 42, 0.08);
        color: var(--brand-strong);
        border-bottom: 1px solid var(--line);
        font-size: 0.92rem;
      }

      #messages {
        height: 420px;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        white-space: pre-wrap;
        line-height: 1.45;
      }

      .message strong {
        display: block;
        margin-bottom: 4px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 20px 24px 24px;
        border-top: 1px solid var(--line);
      }

      input {
        width: 100%;
        border: 1px solid rgba(32, 32, 29, 0.14);
        border-radius: 14px;
        padding: 14px 16px;
        font: inherit;
        background: rgba(255, 255, 255, 0.85);
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 0 20px;
        font: inherit;
        font-weight: 700;
        color: #fff9f4;
        background: linear-gradient(180deg, var(--brand) 0%, var(--brand-strong) 100%);
        cursor: pointer;
      }

      button:disabled,
      input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        main {
          border-radius: 18px;
        }

        #messages {
          height: 52vh;
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Chat Local del Negocio</h1>
        <p class="subtitle">PWA offline con WebLLM y contexto cargado desde archivos locales.</p>
      </header>

      <div id="status" class="status">Iniciando aplicación...</div>
      <section id="messages" aria-live="polite"></section>

      <form id="chat-form">
        <input id="user-input" type="text" placeholder="Escribí una pregunta sobre el negocio" autocomplete="off" disabled />
        <button id="send-button" type="submit" disabled>Enviar</button>
      </form>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
